<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Well | 自我介绍</title>
    <style>
        /* 全局初始化 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", sans-serif;
        }
        body {
            background-color: #f7f3f0;
            padding: 60px 15px;
        }
        /* 总卡片容器 */
        。container {
            max-width: 460px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            padding: 45px 30px;
            box-shadow: 0 10px 30px rgba(180, 160, 140, 0.15);
        }
        /* 头像区域 */
        .avatar-area {
            text-align: center;
            margin-bottom: 24px;
        }
        .avatar {
            width: 170px;
            height: 170px;
            border-radius: 999px;
            border: 5px solid #e8c9b9;
            object-fit: cover;
        }
        /* 昵称 */
        .name {
            text-align: center;
            font-size: 34px;
            color: #44332a;
            letter-spacing: 2px;
        }
        .motto {
            text-align: center;
            color: #998478;
            margin: 8px 0 40px;
            font-size: 16px;
        }
        /* 板块标题 */
        .section-title {
            font-size: 20px;
            color: #6d5548;
            padding-bottom: 10px;
            border-bottom: 2px solid #e8c9b9;
            margin-bottom: 22px;
        }
        /* 列表容器 */
        .list-box {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        /* 每条内容卡片 */
        .list-item {
            background: #f9f4f1;
            padding: 20px;
            border-radius: 12px;
            color: #554237;
            transition: all 0.3s ease;
        }
        .list-item:hover {
            background: #e8c9b9;
            color: #fff;
        }
        .item-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .item-desc {
            font-size: 15px;
            line-height: 1.6;
            opacity: 0.85;
        }
        /* 底部结束语 */
        .end-text {
            margin-top: 50px;
            text-align: center;
            color: #b8a69b;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头像 -->
        <div class="avatar-area">
            <img class="avatar" src="https://q2.qlogo.cn/g?b=qq&nk=3362852713&s=640" alt="Well头像">
        </div>

        <!-- 名字与简介 -->
        <h1 class="name">Well</h1>
        <p class="motto">永远相信美好的事情即将发生</p>

        <!-- 爱好列表区域 -->
        <h2 class="section-title">我的爱好与特长</h2>
        <div class="list-box">
            <div class="list-item">
                <div class="item-title">① 休闲爱好：追番看动漫</div>
                <div class="item-desc">平时空闲时间喜欢观看各类动漫，涵盖热血、治愈、科幻等多种题材，喜欢感受不同故事里独特的世界观与人物剧情。</div>
            </div>
            <div class="list-item">
                <div class="item-title">② 擅长游戏：PUBGM</div>
                <div class="item-desc">长期游玩绝地求生手游，熟悉地图点位、枪械搭配与战术运营，擅长团队配合对战，拥有充足的实战游戏经验。</div>
            </div>
            <div class="list-item">
                <div class="item-title">③ 长期热爱：数码科技</div>
                <div class="item-desc">热衷于各类数码产品，喜欢研究手机、电脑、网络硬件参数，经常折腾设备调试、配件搭配，关注数码新品与硬件测评。</div>
            </div>
        </div>

        <!-- 页面底部结束文字 -->
        <p class="end-text">well 2026</p>
    </div>
</body>
</html>
